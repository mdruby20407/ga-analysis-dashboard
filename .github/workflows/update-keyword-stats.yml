name: Update Keyword Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 5"

permissions:
  contents: write

jobs:
  update-keyword-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Recalculate keyword dashboard
        run: node scripts/update-keyword-stats.mjs

      - name: Commit updated dashboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自動更新關鍵字洞察統計"
          file_pattern: index.html
